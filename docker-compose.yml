services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avtotest}
      POSTGRES_USER: ${POSTGRES_USER:-avtotest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avtotest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avtotest} -d ${POSTGRES_DB:-avtotest}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PORT: 4000
    ports:
      - "4001:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: http://backend:4000
        BASE_URL: https://road-test.uz
        NEXT_PUBLIC_SITE_URL: https://road-test.uz
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      BACKEND_URL: http://backend:4000
      BASE_URL: https://road-test.uz
      NEXT_PUBLIC_SITE_URL: https://road-test.uz
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3010:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
