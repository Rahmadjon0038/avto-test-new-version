<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jo‘rabek Avto Test</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <header class="navbar">
      <div class="brand">
        <div class="logo">JA</div>
        <div class="title">Jo‘rabek Avto Test</div>
      </div>
      <div class="navCenter">
        <button id="examBtn" class="btn btn-ghost" type="button">
          <i class="bi bi-journal-check" aria-hidden="true"></i> Imtihon
        </button>
      </div>
      <div class="actions">
        <div class="actionRow">
          <button id="themeToggle" class="iconBtn" type="button" title="Dark/Light" aria-label="Theme toggle">
            <i id="themeIcon" class="bi bi-moon-stars-fill" aria-hidden="true"></i>
          </button>
          <button id="proBtn" class="btn btn-primary" type="button">
            <span class="labelFull">PRO ga o‘tish</span>
            <span class="labelShort">PRO</span>
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <section id="ticketsView" class="view">
        <h2 class="h2">Biletlar</h2>
        <div id="ticketsGrid" class="grid"></div>
      </section>

      <section id="ticketView" class="view hidden">
        <div class="ticketHeader">
          <button id="backBtn" class="btn btn-ghost" type="button">
            <i class="bi bi-arrow-left" aria-hidden="true"></i> Orqaga
          </button>
          <div>
            <div id="ticketTitle" class="h2"></div>
            <div id="ticketMeta" class="muted"></div>
          </div>
        </div>

        <div id="qNav" class="qnav"></div>

        <div id="questionCard" class="card">
          <div class="qLayout">
            <div class="qLeft">
              <img
                id="qImage"
                class="qimg"
                alt="Savol rasmi"
                loading="lazy"
                decoding="async"
                referrerpolicy="no-referrer"
                crossorigin="anonymous"
              />
            </div>
            <div class="qRight">
              <div id="qText" class="qtext"></div>
              <div id="options" class="options"></div>
              <div id="answerMeta" class="answerMeta hidden"></div>
              <div id="explanation" class="explanation hidden"></div>
            </div>
          </div>
        </div>

        <div class="ticketFooter">
          <div class="footerLeft">
            <button id="prevBtn" class="btn btn-ghost" type="button">
              <i class="bi bi-chevron-left" aria-hidden="true"></i> Orqaga
            </button>
            <button id="nextBtn" class="btn btn-ghost" type="button">
              Keyingi <i class="bi bi-chevron-right" aria-hidden="true"></i>
            </button>
          </div>
          <div class="footerRight">
            <button id="resetBtn" class="btn btn-danger" type="button">
              <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i> Qayta boshlash
            </button>
          </div>
        </div>

        <div id="result" class="resultBlock hidden"></div>
      </section>
    </main>

    <div id="modalOverlay" class="modalOverlay hidden"></div>
    <div id="proModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modalHeader">
        <div class="modalTitle">Promo kod kiriting</div>
        <button id="modalClose" class="btn btn-ghost" type="button">✕</button>
      </div>
      <div class="modalBody">
        <input id="promoInput" class="input" placeholder="Masalan: 12345" inputmode="numeric" maxlength="5" />
        <button id="promoActivate" class="btn btn-primary" type="button">Faollashtirish</button>
        <button id="buyPromo" class="btn btn-ghost" type="button">Promo kod sotib olish</button>
        <div id="promoMsg" class="msg hidden"></div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
