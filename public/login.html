<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Login — Jo‘rabek Avto Test</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <header class="navbar">
      <div class="brand">
        <div class="logo">JA</div>
        <div class="title">Jo‘rabek Avto Test</div>
      </div>
      <div class="actions"></div>
    </header>

    <main class="container">
      <div class="card" style="padding: 16px">
        <div style="display: grid; place-items: center; gap: 12px; padding: 10px 0 4px">
          <div style="font-size: 54px; color: var(--primary)">
            <i class="bi bi-telegram" aria-hidden="true"></i>
          </div>
          <div class="h2" style="margin: 0; text-align: center">Testni boshlash uchun tugmani bosing</div>
          <div class="muted" style="text-align: center">
            Saytdan Telegram bot orqali foydalaniladi (Telegram Web App).
          </div>
        </div>

        <button id="goTelegram" class="btn btn-primary" type="button" style="width: 100%">
          Telegramga o‘tish
        </button>
      </div>
    </main>

    <script>
      // Bot username (without @). Update if you change bot handle.
      const BOT_USERNAME = "JorabekAvtotest_bot";
      const BOT_START_LINK = `https://t.me/${BOT_USERNAME}?start=webapp`;
      const BOT_TG_DEEPLINK = `tg://resolve?domain=${BOT_USERNAME}&start=webapp`;

      document.getElementById("goTelegram").onclick = () => {
        // Prefer opening inside Telegram app if available (Desktop/Mobile).
        try {
          const tg = window.Telegram?.WebApp;
          if (tg?.openTelegramLink) {
            tg.openTelegramLink(BOT_START_LINK);
            try {
              tg.close();
            } catch {}
            return;
          }
        } catch {}

        // Fallback to tg:// deep link (may open app directly)
        try {
          window.location.href = BOT_TG_DEEPLINK;
          return;
        } catch {}

        // Final fallback (opens t.me web page)
        window.location.href = BOT_START_LINK;
      };
    </script>
  </body>
</html>
